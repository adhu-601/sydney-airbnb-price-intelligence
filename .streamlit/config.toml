# App theme — olive + cream, matched to the redesigned dashboard.
# Charts are contrast-validated for this light surface, so we pin light mode
# rather than following the OS setting.
[theme]
base = "light"
primaryColor = "#5C6B2E"            # brand olive — drives sliders, toggles, chips, focus
backgroundColor = "#F4F1E7"         # warm cream page canvas
secondaryBackgroundColor = "#FBF9F1"
textColor = "#23231B"
font = "sans serif"

[browser]
gatherUsageStats = false
